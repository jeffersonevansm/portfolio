<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jordan Reyes — Engineer</title>
<meta name="description" content="Portfolio of an engineer who loves to build and explore." />

<!--
  ============================================================
  TWO-FILE SITE
   • index.html  → this file (the website + how it behaves). Rarely touched.
   • content.js  → your words, photos, projects. EDIT THAT ONE.
  This file loads content.js automatically (see the <script> tag
  near the bottom). If content.js is missing, the built-in sample
  below is used instead.
  ============================================================
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#F1F0EB;          /* plain off-white canvas */
    --ink:#100F0C;         /* near-black            */
    --ink-2:#46443F;       /* secondary text        */
    --ink-3:#8C887F;       /* faint labels          */
    --line:rgba(16,15,12,.14);
    --card:#E9E7E0;        /* monochrome panel      */
    --accent:#2440FF;      /* THE pop (set from content.js) */
    --on-accent:#ffffff;

    --font-display:"Syne","Segoe UI",system-ui,sans-serif;
    --font-body:"Manrope",system-ui,-apple-system,sans-serif;
    --font-mono:"Space Mono","SFMono-Regular",Consolas,monospace;

    --spring:cubic-bezier(.34,1.56,.64,1);
    --ease:cubic-bezier(.22,.61,.36,1);
  }

  *,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
  html{ scroll-behavior:smooth; }
  body{ background:var(--bg); color:var(--ink); font-family:var(--font-body); line-height:1.6; -webkit-font-smoothing:antialiased; overflow-x:hidden; }
  a{ color:inherit; text-decoration:none; }
  button{ font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
  img{ display:block; max-width:100%; }
  ::selection{ background:var(--accent); color:var(--on-accent); }
  .accent{ color:var(--accent); }

  /* ---------- LOADER ---------- */
  #loader{ position:fixed; inset:0; z-index:100; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:26px; transition:opacity .6s var(--ease), visibility .6s; }
  #loader.done{ opacity:0; visibility:hidden; }
  .ld-mark{ font-family:var(--font-display); font-weight:800; font-size:46px; letter-spacing:-.04em; color:var(--ink); }
  .ld-mark b{ color:var(--accent); }
  .ld-bar{ width:180px; height:3px; background:var(--card); overflow:hidden; border-radius:99px; }
  .ld-bar i{ display:block; height:100%; width:0%; background:var(--accent); transition:width .15s linear; }
  .ld-pct{ font-family:var(--font-mono); font-size:12px; color:var(--ink-3); letter-spacing:.1em; }

  /* ---------- INTRO ---------- */
  #intro{ position:fixed; inset:0; z-index:90; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:24px; opacity:0; visibility:hidden; transition:opacity .7s var(--ease), visibility .7s; }
  #intro.show{ opacity:1; visibility:visible; }
  #intro.leaving{ opacity:0; visibility:hidden; }
  .intro-hello{ font-family:var(--font-display); font-weight:800; font-size:clamp(3.4rem,14vw,9rem); line-height:.9; letter-spacing:-.05em; opacity:0; animation:rise .7s var(--spring) .1s forwards; }
  .intro-hello b{ color:var(--accent); }
  .intro-sub{ margin-top:18px; font-family:var(--font-mono); font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-3); opacity:0; animation:rise .7s var(--ease) .35s forwards; }
  @keyframes rise{ from{opacity:0; transform:translateY(22px)} to{opacity:1; transform:none} }

  /* ---------- NAV ---------- */
  nav.top{ position:fixed; top:0; left:0; right:0; z-index:50; display:flex; align-items:center; justify-content:space-between; padding:20px clamp(20px,5vw,56px); mix-blend-mode:difference; }
  nav.top *{ color:#fff; } /* difference blend keeps it readable on any bg */
  .logo{ display:flex; align-items:center; gap:11px; font-family:var(--font-display); font-weight:800; font-size:1.05rem; letter-spacing:-.02em; }
  .logo .badge{ width:30px; height:30px; border:1.5px solid #fff; border-radius:8px; display:grid; place-items:center; font-size:.8rem; }
  .nav-links{ display:flex; gap:6px; }
  .nav-links a{ font-family:var(--font-mono); font-size:12px; letter-spacing:.06em; padding:8px 13px; border-radius:99px; transition:opacity .25s; opacity:.65; }
  .nav-links a:hover, .nav-links a.active{ opacity:1; }
  .nav-links a.active::before{ content:"› "; }

  /* ---------- LAYOUT ---------- */
  main{ opacity:0; transition:opacity .7s var(--ease); }
  main.ready{ opacity:1; }
  section, header.hero{ padding:0 clamp(20px,5vw,56px); }
  [data-reveal]{ opacity:0; transform:translateY(26px); transition:opacity .7s var(--ease), transform .7s var(--ease); }
  [data-reveal].in{ opacity:1; transform:none; }

  /* ---------- HERO ---------- */
  header.hero{ min-height:100vh; display:grid; grid-template-columns:1.15fr .85fr; align-items:center; gap:clamp(30px,5vw,70px); padding-top:90px; }
  .eyebrow{ display:inline-flex; align-items:center; gap:9px; font-family:var(--font-mono); font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-2); margin-bottom:26px; }
  .eyebrow .pip{ width:8px; height:8px; border-radius:50%; background:var(--accent); animation:pulse 2.2s var(--ease) infinite; }
  @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.35} }
  h1.name{ font-family:var(--font-display); font-weight:800; font-size:clamp(3.2rem,8.5vw,7.5rem); line-height:.86; letter-spacing:-.05em; margin-bottom:24px; }
  .role{ font-family:var(--font-display); font-weight:600; font-size:clamp(1.1rem,2.4vw,1.6rem); margin-bottom:20px; }
  .lead{ color:var(--ink-2); font-size:1.12rem; max-width:44ch; margin-bottom:34px; }
  .hero-cta{ display:flex; gap:13px; flex-wrap:wrap; }
  .btn{ display:inline-flex; align-items:center; gap:10px; padding:15px 26px; border-radius:99px; font-family:var(--font-display); font-weight:700; font-size:.96rem; transition:transform .3s var(--spring), background .25s, color .25s; }
  .btn .arr{ transition:transform .3s var(--spring); }
  .btn:hover{ transform:translateY(-3px); } .btn:hover .arr{ transform:translateX(4px); }
  .btn.primary{ background:var(--accent); color:var(--on-accent); }
  .btn.ghost{ border:1.6px solid var(--ink); }
  .btn.ghost:hover{ background:var(--ink); color:var(--bg); }
  .scroll-cue{ position:absolute; bottom:30px; left:clamp(20px,5vw,56px); font-family:var(--font-mono); font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-3); display:flex; align-items:center; gap:8px; }
  .scroll-cue .ln{ width:34px; height:1px; background:var(--ink-3); position:relative; overflow:hidden; }
  .scroll-cue .ln::after{ content:""; position:absolute; inset:0; background:var(--accent); animation:slide 1.8s var(--ease) infinite; }
  @keyframes slide{ 0%{transform:translateX(-100%)} 60%,100%{transform:translateX(100%)} }

  /* ---------- BRUSH PHOTO ---------- */
  .brush{ position:relative; aspect-ratio:4/5; border-radius:22px; overflow:hidden; background:var(--card); cursor:none; touch-action:none; user-select:none; box-shadow:0 30px 60px rgba(16,15,12,.12); }
  .brush-reveal{ position:absolute; inset:0; }
  .brush-reveal img{ width:100%; height:100%; object-fit:cover; }
  .ph{ width:100%; height:100%; display:grid; place-items:center; position:relative; }
  .ph .mk{ font-family:var(--font-display); font-weight:800; font-size:clamp(3rem,9vw,5.5rem); letter-spacing:-.03em; }
  .ph-reveal{ background:var(--ink); } .ph-reveal .mk{ color:var(--accent); }
  .ph-reveal .tag{ position:absolute; bottom:22px; font-family:var(--font-mono); font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:#fff; opacity:.55; }
  .brush canvas{ position:absolute; inset:0; width:100%; height:100%; }
  .brush-ring{ position:absolute; width:90px; height:90px; border:1.5px solid var(--accent); border-radius:50%; margin:-45px 0 0 -45px; pointer-events:none; opacity:0; transition:opacity .2s, transform .08s ease-out; mix-blend-mode:difference; }
  .brush:hover .brush-ring{ opacity:1; }
  .brush-hint{ position:absolute; top:18px; left:18px; z-index:3; font-family:var(--font-mono); font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:#fff; mix-blend-mode:difference; pointer-events:none; display:flex; align-items:center; gap:7px; }
  .brush-hint .d{ width:6px; height:6px; border-radius:50%; background:var(--accent); }

  /* ---------- SECTION HEADERS ---------- */
  .sec-tag{ font-family:var(--font-mono); font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-3); display:flex; align-items:center; gap:12px; margin-bottom:30px; }
  .sec-tag::before{ content:""; width:30px; height:1px; background:var(--accent); }
  .sec-title{ font-family:var(--font-display); font-weight:800; font-size:clamp(2.2rem,6vw,4rem); letter-spacing:-.04em; }

  /* ---------- ABOUT ---------- */
  #about{ padding-top:clamp(80px,12vh,150px); padding-bottom:clamp(80px,12vh,150px); }
  .about-grid{ display:grid; grid-template-columns:.5fr 1fr; gap:clamp(30px,5vw,70px); }
  .about-copy .big{ font-family:var(--font-display); font-weight:600; font-size:clamp(1.4rem,3vw,2.1rem); line-height:1.32; letter-spacing:-.02em; margin-bottom:28px; }
  .about-copy p{ color:var(--ink-2); font-size:1.1rem; margin-bottom:18px; max-width:62ch; }
  .about-cols{ display:flex; gap:48px; flex-wrap:wrap; margin-top:34px; }
  .about-cols h4{ font-family:var(--font-mono); font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-3); margin-bottom:14px; }
  .about-cols ul{ list-style:none; }
  .about-cols li{ font-family:var(--font-display); font-weight:600; font-size:1.05rem; padding:5px 0; }
  .chips{ display:flex; flex-wrap:wrap; gap:8px; max-width:340px; }
  .chip{ font-family:var(--font-mono); font-size:11.5px; border:1px solid var(--line); border-radius:99px; padding:7px 13px; transition:all .25s var(--spring); }
  .chip:hover{ border-color:var(--accent); color:var(--accent); transform:translateY(-2px); }

  /* ---------- WORK (drag rail) ---------- */
  #work{ padding-top:clamp(60px,9vh,110px); padding-bottom:clamp(80px,12vh,150px); overflow:hidden; }
  .work-head{ display:flex; align-items:flex-end; justify-content:space-between; gap:20px; flex-wrap:wrap; margin-bottom:36px; }
  .drag-hint{ font-family:var(--font-mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-3); display:flex; align-items:center; gap:10px; }
  .drag-hint .track{ width:60px; height:1px; background:var(--line); position:relative; overflow:hidden; }
  .drag-hint .track::after{ content:""; position:absolute; inset:0; width:40%; background:var(--accent); animation:railhint 2.2s var(--ease) infinite; }
  @keyframes railhint{ 0%{transform:translateX(-60%)} 100%{transform:translateX(220%)} }
  .rail{ display:flex; gap:20px; overflow-x:auto; padding:6px clamp(20px,5vw,56px) 30px; margin:0 calc(-1 * clamp(20px,5vw,56px)); scroll-snap-type:x proximity; scrollbar-width:none; cursor:grab; }
  .rail::-webkit-scrollbar{ display:none; }
  .rail.dragging{ cursor:grabbing; scroll-snap-type:none; }
  .rail.dragging .card{ pointer-events:none; }
  .card{ flex:0 0 min(360px,82vw); scroll-snap-align:start; background:var(--card); border-radius:22px; padding:30px 28px; min-height:300px; display:flex; flex-direction:column; transition:transform .35s var(--spring); position:relative; overflow:hidden; }
  .card:hover{ transform:translateY(-6px); }
  .card::after{ content:""; position:absolute; left:0; bottom:0; height:4px; width:0; background:var(--accent); transition:width .4s var(--ease); }
  .card:hover::after{ width:100%; }
  .card-top{ display:flex; align-items:center; justify-content:space-between; }
  .card-num{ font-family:var(--font-mono); font-size:12px; color:var(--accent); }
  .card-cat{ font-family:var(--font-mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-3); border:1px solid var(--line); border-radius:99px; padding:5px 11px; }
  .card h3{ font-family:var(--font-display); font-weight:800; font-size:1.7rem; letter-spacing:-.025em; margin:26px 0 12px; }
  .card-sum{ color:var(--ink-2); font-size:.98rem; margin-bottom:18px; }
  .card-tags{ display:flex; flex-wrap:wrap; gap:7px; margin-top:auto; }
  .card-tags span{ font-family:var(--font-mono); font-size:10px; color:var(--ink-2); }
  .card-tags span:not(:last-child)::after{ content:" /"; color:var(--ink-3); }
  .card-open{ margin-top:18px; font-family:var(--font-mono); font-size:11px; color:var(--accent); display:inline-flex; gap:6px; transition:gap .25s; }
  .card:hover .card-open{ gap:11px; }
  .rail-end{ flex:0 0 1px; }

  /* ---------- MODAL ---------- */
  #modal{ position:fixed; inset:0; z-index:80; display:flex; align-items:center; justify-content:center; padding:24px; opacity:0; visibility:hidden; transition:opacity .35s var(--ease), visibility .35s; }
  #modal.open{ opacity:1; visibility:visible; }
  .scrim{ position:absolute; inset:0; background:rgba(16,15,12,.5); backdrop-filter:blur(4px); }
  .modal-card{ position:relative; z-index:1; background:var(--bg); border-radius:24px; max-width:620px; width:100%; max-height:86vh; overflow-y:auto; padding:clamp(28px,4vw,46px); transform:translateY(20px) scale(.96); transition:transform .4s var(--spring); }
  #modal.open .modal-card{ transform:none; }
  .modal-card::-webkit-scrollbar{ width:8px } .modal-card::-webkit-scrollbar-thumb{ background:var(--line); border-radius:99px }
  .m-close{ position:absolute; top:16px; right:16px; width:42px; height:42px; border-radius:50%; background:var(--card); display:grid; place-items:center; font-size:20px; transition:all .3s var(--spring); }
  .m-close:hover{ background:var(--accent); color:var(--on-accent); transform:rotate(90deg); }
  .m-cat{ font-family:var(--font-mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--accent); }
  .m-title{ font-family:var(--font-display); font-weight:800; font-size:clamp(1.7rem,4vw,2.4rem); letter-spacing:-.03em; margin:12px 0 4px; }
  .m-meta{ font-family:var(--font-mono); font-size:12px; color:var(--ink-3); margin-bottom:22px; }
  .m-body p{ color:var(--ink-2); font-size:1.04rem; margin-bottom:14px; }
  .m-label{ font-family:var(--font-mono); font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-3); margin:24px 0 12px; }
  .m-tags{ display:flex; flex-wrap:wrap; gap:8px; }
  .m-tag{ font-family:var(--font-mono); font-size:11px; background:var(--card); border-radius:99px; padding:6px 13px; }
  .m-links{ display:flex; gap:12px; flex-wrap:wrap; margin-top:26px; }

  /* ---------- CONTACT ---------- */
  #contact{ padding-top:clamp(70px,10vh,130px); padding-bottom:60px; }
  .contact-big{ font-family:var(--font-display); font-weight:800; font-size:clamp(2.6rem,9vw,6.5rem); line-height:.92; letter-spacing:-.045em; margin-bottom:26px; }
  .contact-sub{ color:var(--ink-2); font-size:1.15rem; max-width:46ch; margin-bottom:34px; }
  .email-link{ display:inline-block; font-family:var(--font-display); font-weight:700; font-size:clamp(1.3rem,3.5vw,2.2rem); letter-spacing:-.02em; padding-bottom:6px; border-bottom:3px solid var(--accent); transition:color .25s; }
  .email-link:hover{ color:var(--accent); }
  .soc{ display:flex; gap:10px; flex-wrap:wrap; margin-top:40px; }
  .soc a{ font-family:var(--font-mono); font-size:13px; border:1px solid var(--line); border-radius:99px; padding:11px 20px; transition:all .25s var(--spring); display:inline-flex; gap:8px; align-items:center; }
  .soc a:hover{ border-color:var(--accent); color:var(--accent); transform:translateY(-3px); }
  footer{ margin-top:clamp(60px,10vh,120px); padding:26px clamp(20px,5vw,56px); border-top:1px solid var(--line); display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; font-family:var(--font-mono); font-size:11px; color:var(--ink-3); letter-spacing:.06em; }

  /* ---------- MOBILE ---------- */
  .menu-btn{ display:none; }
  @media (max-width:900px){
    header.hero{ grid-template-columns:1fr; padding-top:110px; gap:36px; }
    .brush{ max-width:340px; }
    .about-grid{ grid-template-columns:1fr; gap:20px; }
  }
  @media (max-width:680px){
    .nav-links{ position:fixed; inset:0; top:0; flex-direction:column; justify-content:center; align-items:center; gap:14px; background:var(--ink); transform:translateX(100%); transition:transform .4s var(--ease); mix-blend-mode:normal; }
    .nav-links.open{ transform:none; }
    .nav-links a{ font-size:1.4rem; opacity:.8; color:#fff; }
    .menu-btn{ display:grid; place-items:center; gap:4px; width:38px; height:38px; }
    .menu-btn span{ display:block; width:20px; height:2px; background:#fff; border-radius:2px; transition:.3s; }
    .menu-btn.open span:nth-child(1){ transform:translateY(6px) rotate(45deg); }
    .menu-btn.open span:nth-child(2){ opacity:0; }
    .menu-btn.open span:nth-child(3){ transform:translateY(-6px) rotate(-45deg); }
    .scroll-cue{ display:none; }
  }
  @media (prefers-reduced-motion:reduce){
    *{ animation-duration:.001ms !important; transition-duration:.001ms !important; scroll-behavior:auto !important; }
    [data-reveal]{ opacity:1 !important; transform:none !important; }
  }
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="ld-mark" id="ldMark">J<b>R</b></div>
  <div class="ld-bar"><i id="ldFill"></i></div>
  <div class="ld-pct" id="ldPct">0</div>
</div>

<!-- INTRO -->
<div id="intro">
  <h2 class="intro-hello" id="introHello">Hello<b>.</b></h2>
  <p class="intro-sub" id="introSub"></p>
</div>

<!-- NAV -->
<nav class="top">
  <a class="logo" href="#home"><span class="badge" id="navBadge">JR</span><span id="navName">Jordan Reyes</span></a>
  <div class="nav-links" id="navLinks">
    <a href="#home" class="active">home</a>
    <a href="#about">about</a>
    <a href="#work">work</a>
    <a href="#contact">contact</a>
  </div>
  <button class="menu-btn" id="menuBtn" aria-label="Menu"><span></span><span></span><span></span></button>
</nav>

<main id="main">
  <!-- HERO -->
  <header class="hero" id="home">
    <div id="heroText"></div>
    <div data-reveal style="transition-delay:.15s">
      <div class="brush" id="brush">
        <div class="brush-reveal" id="brushReveal"></div>
        <canvas></canvas>
        <div class="brush-hint"><span class="d"></span><span id="brushHintText">move to reveal</span></div>
        <div class="brush-ring" id="brushRing"></div>
      </div>
    </div>
    <div class="scroll-cue"><span class="ln"></span>scroll</div>
  </header>

  <!-- ABOUT -->
  <section id="about"><div id="aboutInner"></div></section>

  <!-- WORK -->
  <section id="work">
    <div class="work-head" data-reveal>
      <div><div class="sec-tag">Selected work</div><h2 class="sec-title">Projects<span class="accent">.</span></h2></div>
      <div class="drag-hint">drag<span class="track"></span>through</div>
    </div>
    <div class="rail" id="rail" data-reveal style="transition-delay:.1s"></div>
  </section>

  <!-- CONTACT -->
  <section id="contact"><div id="contactInner"></div></section>
  <footer id="footer"></footer>
</main>

<!-- MODAL -->
<div id="modal" role="dialog" aria-modal="true" aria-labelledby="mTitle">
  <div class="scrim" data-close></div>
  <div class="modal-card">
    <button class="m-close" data-close aria-label="Close">×</button>
    <div class="m-cat" id="mCat"></div>
    <h3 class="m-title" id="mTitle"></h3>
    <div class="m-meta" id="mMeta"></div>
    <div class="m-body" id="mBody"></div>
    <div class="m-label">Built with</div>
    <div class="m-tags" id="mTags"></div>
    <div class="m-links" id="mLinks"></div>
  </div>
</div>

<!-- ============ YOUR CONTENT loads here ============ -->
<script src="content.js"></script>

<script>

const C = (window.SITE_CONTENT && window.SITE_CONTENT.profile) ? window.SITE_CONTENT : FALLBACK;
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const esc = s => String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

/* apply accent */
document.documentElement.style.setProperty('--accent', C.accentColor || "#2440FF");

/* ---------- BRUSH PHOTO ---------- */
function initBrush(){
  const stage = document.getElementById('brush');
  const reveal = document.getElementById('brushReveal');
  const canvas = stage.querySelector('canvas');
  const ring = document.getElementById('brushRing');
  const ctx = canvas.getContext('2d');
  const p = C.profile;
  const dpr = Math.min(window.devicePixelRatio||1, 2);
  let W=0,H=0, last=null;

  // bottom layer (the reveal): photo or placeholder
  if(p.photoReveal){ reveal.innerHTML = `<img src="${esc(p.photoReveal)}" alt="${esc(p.name)}">`; }
  else { reveal.innerHTML = `<div class="ph ph-reveal"><span class="mk">${esc(p.initials)}</span><span class="tag">hello there</span></div>`; }

  // cover image (optional)
  let coverImg=null, coverReady=false;
  if(p.photo){ coverImg=new Image(); coverImg.onload=()=>{ coverReady=true; paintCover(1); }; coverImg.src=p.photo; }

  function fit(img){ const s=Math.max(W/img.width, H/img.height); const w=img.width*s, h=img.height*s; return [ (W-w)/2,(H-h)/2,w,h ]; }
  function paintCover(alpha){
    ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=alpha;
    if(coverReady){ const [x,y,w,h]=fit(coverImg); ctx.drawImage(coverImg,x,y,w,h); }
    else {
      const g=ctx.createLinearGradient(0,0,W,H);
      g.addColorStop(0, getComputedStyle(document.documentElement).getPropertyValue('--accent').trim()||'#2440FF');
      g.addColorStop(1, '#1a30c8');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.font=`800 ${Math.min(W,H)*0.34}px Syne, sans-serif`;
      ctx.fillText(p.initials||'', W/2, H/2);
    }
    ctx.globalAlpha=1;
  }
  function size(){
    const r=stage.getBoundingClientRect(); W=r.width; H=r.height;
    canvas.width=W*dpr; canvas.height=H*dpr; ctx.setTransform(dpr,0,0,dpr,0,0);
    paintCover(1);
  }
  function erase(x,y,r){
    ctx.globalCompositeOperation='destination-out';
    const g=ctx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,'rgba(0,0,0,1)'); g.addColorStop(.55,'rgba(0,0,0,.65)'); g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  }
  function stroke(x,y){
    const r=Math.max(W,H)*0.14;
    if(last){ const dx=x-last.x, dy=y-last.y, dist=Math.hypot(dx,dy), steps=Math.ceil(dist/(r*0.4));
      for(let i=0;i<=steps;i++) erase(last.x+dx*i/steps, last.y+dy*i/steps, r); }
    else erase(x,y,r);
    last={x,y};
  }
  function pos(e){ const r=stage.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top}; }

  stage.addEventListener('pointermove', e=>{
    const {x,y}=pos(e); ring.style.transform=`translate(${x}px,${y}px)`;
    if(reduceMotion){ canvas.style.opacity=0; return; }
    stroke(x,y);
  });
  stage.addEventListener('pointerleave', ()=>{ last=null; });
  stage.addEventListener('pointerdown', e=>{ const {x,y}=pos(e); stroke(x,y); }); // tap reveals on touch

  // slow "heal" so the cover gently returns (reusable)
  if(!reduceMotion){ setInterval(()=>{ paintCover(0.022); }, 45); }

  size();
  let rt; window.addEventListener('resize', ()=>{ clearTimeout(rt); rt=setTimeout(size,150); });
}

/* ---------- DRAG RAIL ---------- */
let railDragged=false;
function initRail(){
  const rail=document.getElementById('rail');
  let down=false, startX=0, startScroll=0, moved=0;
  rail.addEventListener('pointerdown', e=>{
    if(e.pointerType!=='mouse') return;          // touch uses native scroll
    down=true; railDragged=false; moved=0; startX=e.clientX; startScroll=rail.scrollLeft;
    rail.classList.add('dragging'); rail.setPointerCapture(e.pointerId);
  });
  rail.addEventListener('pointermove', e=>{
    if(!down) return;
    const dx=e.clientX-startX; moved=Math.abs(dx);
    if(moved>5) railDragged=true;
    rail.scrollLeft=startScroll-dx;
  });
  const end=()=>{ down=false; rail.classList.remove('dragging'); setTimeout(()=>railDragged=false,30); };
  rail.addEventListener('pointerup', end);
  rail.addEventListener('pointercancel', end);
  // wheel: let vertical wheel move the rail horizontally when hovered
  rail.addEventListener('wheel', e=>{
    if(Math.abs(e.deltaY)>Math.abs(e.deltaX)){ rail.scrollLeft += e.deltaY; e.preventDefault(); }
  }, {passive:false});
}

/* ---------- MODAL ---------- */
function openModal(pr){
  if(!pr) return;
  document.getElementById('mCat').textContent=pr.category;
  document.getElementById('mTitle').textContent=pr.title;
  document.getElementById('mMeta').textContent=`${pr.year} · Project`;
  document.getElementById('mBody').innerHTML=(pr.description||[]).map(d=>`<p>${esc(d)}</p>`).join('');
  document.getElementById('mTags').innerHTML=(pr.tags||[]).map(t=>`<span class="m-tag">${esc(t)}</span>`).join('');
  document.getElementById('mLinks').innerHTML=(pr.links||[]).map(l=>`<a class="btn ghost" href="${esc(l.url)}" ${/^https?:/.test(l.url)?'target="_blank" rel="noopener"':''}>${esc(l.label)}</a>`).join('');
  document.getElementById('modal').classList.add('open'); document.body.style.overflow='hidden';
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); document.body.style.overflow=''; }

/* ---------- SCROLL REVEAL + ACTIVE NAV ---------- */
function initScroll(){
  const io=new IntersectionObserver(es=>{ es.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add('in'); io.unobserve(en.target); } }); }, {threshold:.12});
  document.querySelectorAll('[data-reveal]').forEach(el=> io.observe(el));

  const secs=['home','about','work','contact'].map(id=>document.getElementById(id));
  const navA=[...document.querySelectorAll('.nav-links a')];
  const navIO=new IntersectionObserver(es=>{ es.forEach(en=>{ if(en.isIntersecting){
    const id=en.target.id; navA.forEach(a=> a.classList.toggle('active', a.getAttribute('href')==='#'+id));
  }}); }, {threshold:.4});
  secs.forEach(s=> s && navIO.observe(s));
}

/* ---------- LOADER + INTRO ---------- */
function runLoader(){
  const loader=document.getElementById('loader'), fill=document.getElementById('ldFill'), pct=document.getElementById('ldPct');
  const dur=reduceMotion?1:1300, start=performance.now();
  (function tick(now){ const t=Math.min(1,(now-start)/dur); const v=Math.round(t*100);
    fill.style.width=v+'%'; pct.textContent=v;
    if(t<1) requestAnimationFrame(tick); else setTimeout(()=>{ loader.classList.add('done'); showIntro(); }, reduceMotion?0:250);
  })(start);
}
function showIntro(){
  const intro=document.getElementById('intro'), main=document.getElementById('main');
  /* ===== ONE-TIME INTRO (turn on after you deploy) =====
     To show "Hello" only on a visitor's first ever visit, uncomment:
       try{ if(localStorage.getItem('seen')){ main.classList.add('ready'); return; } localStorage.setItem('seen','1'); }catch(e){}
     ===================================================== */
  main.classList.add('ready'); intro.classList.add('show');
  const leave=()=>{ intro.classList.add('leaving'); window.removeEventListener('keydown',k); window.removeEventListener('wheel',leave); };
  const k=e=>{ if(e.key==='Enter'||e.key===' '||e.key==='Escape') leave(); };
  intro.addEventListener('click', leave);
  window.addEventListener('keydown', k);
  window.addEventListener('wheel', leave, {once:true, passive:true});
  setTimeout(()=>{ if(intro.classList.contains('show')&&!intro.classList.contains('leaving')) leave(); }, reduceMotion?100:2400);
}

/* ---------- INIT ---------- */
window.addEventListener('DOMContentLoaded', ()=>{
  render();
  initBrush();
  initRail();
  initScroll();

  // mobile menu
  const menuBtn=document.getElementById('menuBtn'), navLinks=document.getElementById('navLinks');
  menuBtn.addEventListener('click', ()=>{ menuBtn.classList.toggle('open'); navLinks.classList.toggle('open'); });
  navLinks.querySelectorAll('a').forEach(a=> a.addEventListener('click', ()=>{ menuBtn.classList.remove('open'); navLinks.classList.remove('open'); }));

  // modal close
  document.querySelectorAll('#modal [data-close]').forEach(el=> el.addEventListener('click', closeModal));
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

  runLoader();
});
</script>
