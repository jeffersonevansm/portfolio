<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jordan Reyes — Engineer</title>
<meta name="description" content="Portfolio of an engineer who loves to explore and build." />

<!--
  ================================================================
  PORTFOLIO — "Territories"  (single file: HTML + CSS + JS)
  ================================================================
  HOW TO EDIT YOUR CONTENT (the easy way):
    • Open the live site and click the "Edit" button (bottom-right).
    • Change your name, bio, projects, links — it updates live.
    • Click "Export content.json" to download your content.
    • Upload that content.json next to index.html on your host.
      The site loads from content.json, so that's all you change later.

  Prefer editing by hand? All content lives in the DEFAULT_CONTENT
  object near the top of the <script> at the bottom of this file,
  or in the exported content.json. It's plain, labelled JSON.
  ================================================================
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  /* ===================== TOKENS ===================== */
  :root{
    --paper:   #FAF8F2;     /* bright canvas              */
    --paper-2: #F2EFE6;     /* panel tint                 */
    --ink:     #14110E;     /* near-black text            */
    --ink-soft:#5C574F;     /* secondary text             */
    --ink-faint:#9A938A;    /* tertiary / labels          */
    --line:    rgba(20,17,14,0.12);

    --pop:     #FFD23F;     /* constant sunshine yellow    */

    /* section accents (set live per tab via JS) */
    --accent:    #2F5BFF;
    --on-accent: #ffffff;
    --accent-2:  #FFD23F;   /* secondary shape colour      */

    --font-display: "Bricolage Grotesque", "Segoe UI", system-ui, sans-serif;
    --font-body:    "Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
    --font-mono:    "DM Mono", "SFMono-Regular", Consolas, monospace;

    --sidebar-w: 260px;
    --spring: cubic-bezier(.34,1.56,.64,1);
    --ease:   cubic-bezier(.22,.61,.36,1);
  }

  /* ===================== BASE ===================== */
  *,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
  html{ scroll-behavior:smooth; }
  body{
    background:var(--paper); color:var(--ink);
    font-family:var(--font-body); font-weight:400; line-height:1.6;
    -webkit-font-smoothing:antialiased; overflow-x:hidden; min-height:100vh;
  }
  a{ color:inherit; text-decoration:none; }
  button{ font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
  img{ display:block; max-width:100%; }
  input,textarea,select{ font-family:inherit; }
  ::selection{ background:var(--accent); color:var(--on-accent); }

  /* floating exploration shapes (recolour with --accent) */
  .shapes{ position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
  .blob{ position:absolute; border-radius:50%; filter:blur(2px); opacity:.9; transition:background .6s var(--ease); }
  .blob.b1{ width:340px; height:340px; background:var(--accent); top:-120px; right:-80px; opacity:.16; animation:float1 16s ease-in-out infinite; }
  .blob.b2{ width:220px; height:220px; background:var(--pop); bottom:8%; left:-70px; opacity:.5; animation:float2 13s ease-in-out infinite; }
  .blob.b3{ width:150px; height:150px; background:var(--accent); bottom:-50px; right:18%; opacity:.12; animation:float1 19s ease-in-out infinite reverse; }
  .ast{ position:absolute; font-family:var(--font-display); color:var(--accent); opacity:.5; transition:color .6s var(--ease); }
  .ast.a1{ font-size:60px; top:16%; left:8%; animation:spin 22s linear infinite; }
  .ast.a2{ font-size:34px; top:62%; right:10%; color:var(--pop); opacity:.9; animation:spin 14s linear infinite reverse; }
  @keyframes float1{ 0%,100%{transform:translate(0,0)} 50%{transform:translate(-26px,30px)} }
  @keyframes float2{ 0%,100%{transform:translate(0,0)} 50%{transform:translate(34px,-24px)} }
  @keyframes spin{ to{ transform:rotate(360deg) } }

  /* now-exploring badge */
  .badge{
    position:fixed; top:22px; right:26px; z-index:6;
    font-family:var(--font-mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--ink-faint); display:flex; align-items:center; gap:8px; pointer-events:none;
  }
  .badge .ring{ width:9px; height:9px; border-radius:50%; background:var(--accent); transition:background .5s var(--ease); }
  .badge b{ color:var(--ink); }

  /* ===================== LOADER ===================== */
  #loader{
    position:fixed; inset:0; z-index:100; background:var(--paper);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:34px;
    transition:opacity .6s var(--ease), visibility .6s;
  }
  #loader.done{ opacity:0; visibility:hidden; }
  .load-mark{ font-family:var(--font-display); font-size:72px; color:var(--accent); animation:spin 3s linear infinite; }
  .load-msg{ font-family:var(--font-mono); font-size:13px; letter-spacing:.08em; color:var(--ink-soft); min-height:18px; }
  .load-bar{ width:min(320px,70vw); height:6px; background:var(--paper-2); border-radius:99px; overflow:hidden; }
  .load-bar i{ display:block; height:100%; width:0%; background:var(--accent); border-radius:99px; transition:width .2s linear; }

  /* ===================== INTRO ===================== */
  #intro{
    position:fixed; inset:0; z-index:90; background:var(--accent); color:var(--on-accent);
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:24px;
    opacity:0; visibility:hidden; transition:opacity .7s var(--ease), visibility .7s;
    overflow:hidden;
  }
  #intro.show{ opacity:1; visibility:visible; }
  #intro.leaving{ opacity:0; visibility:hidden; }
  #intro .deco{ position:absolute; font-family:var(--font-display); opacity:.18; }
  #intro .deco.d1{ font-size:120px; top:8%; left:6%; animation:spin 20s linear infinite; }
  #intro .deco.d2{ font-size:80px; bottom:10%; right:8%; animation:spin 16s linear infinite reverse; }
  #intro .deco.d3{ width:180px; height:180px; border-radius:50%; background:var(--pop); opacity:.25; bottom:-40px; left:12%; }
  .intro-tag{ font-family:var(--font-mono); font-size:13px; letter-spacing:.3em; text-transform:uppercase; opacity:0; animation:rise .6s var(--ease) .1s forwards; }
  .intro-hello{ font-family:var(--font-display); font-weight:800; font-size:clamp(3rem,12vw,8rem); line-height:.95; letter-spacing:-0.04em; margin:18px 0; opacity:0; animation:rise .7s var(--spring) .25s forwards; }
  .intro-sub{ max-width:480px; font-size:1.1rem; opacity:0; animation:rise .7s var(--ease) .45s forwards; }
  .enter-btn{
    margin-top:40px; display:inline-flex; align-items:center; gap:12px; background:var(--on-accent); color:var(--accent);
    font-family:var(--font-mono); font-size:14px; letter-spacing:.06em; padding:17px 30px; border-radius:99px; font-weight:500;
    opacity:0; animation:rise .7s var(--spring) .65s forwards; transition:transform .3s var(--spring);
  }
  .enter-btn:hover{ transform:scale(1.06) rotate(-1deg); }
  .enter-btn .arrow{ transition:transform .3s var(--spring); }
  .enter-btn:hover .arrow{ transform:translateX(5px); }
  @keyframes rise{ from{opacity:0; transform:translateY(20px)} to{opacity:1; transform:none} }

  /* ===================== APP ===================== */
  .app{ position:relative; z-index:2; display:grid; grid-template-columns:var(--sidebar-w) 1fr; min-height:100vh; opacity:0; transition:opacity .7s var(--ease); }
  .app.ready{ opacity:1; }

  /* SIDEBAR */
  .sidebar{ position:sticky; top:0; height:100vh; border-right:1px solid var(--line); display:flex; flex-direction:column; padding:32px 26px; }
  .brand{ display:flex; align-items:center; gap:12px; }
  .monogram{ font-family:var(--font-display); font-weight:800; font-size:1.2rem; color:var(--on-accent); background:var(--accent); width:44px; height:44px; border-radius:14px; display:grid; place-items:center; flex:none; transition:background .5s var(--ease); transform:rotate(-4deg); }
  .brand-name{ font-family:var(--font-display); font-weight:700; font-size:1.05rem; line-height:1.1; }
  .brand-name span{ display:block; font-family:var(--font-mono); font-weight:400; font-size:11px; color:var(--ink-faint); letter-spacing:.04em; margin-top:3px; }

  .nav{ margin-top:50px; display:flex; flex-direction:column; gap:4px; }
  .nav-label{ font-family:var(--font-mono); font-size:10px; letter-spacing:.2em; color:var(--ink-faint); text-transform:uppercase; margin-bottom:14px; }
  .nav-item{ display:flex; align-items:center; gap:13px; padding:11px 13px; border-radius:12px; font-family:var(--font-display); font-weight:600; font-size:1.05rem; color:var(--ink-soft); transition:all .25s var(--ease); text-align:left; width:100%; }
  .nav-item .dot{ width:9px; height:9px; border-radius:50%; border:2px solid var(--ink-faint); flex:none; transition:all .25s var(--spring); }
  .nav-item:hover{ color:var(--ink); transform:translateX(3px); }
  .nav-item.active{ color:var(--ink); background:var(--paper-2); }
  .nav-item.active .dot{ background:var(--accent); border-color:var(--accent); transform:scale(1.25); }
  .nav-item .idx{ margin-left:auto; font-family:var(--font-mono); font-size:11px; color:var(--ink-faint); }

  .sidebar-foot{ margin-top:auto; display:flex; flex-direction:column; gap:14px; }
  .status{ display:flex; align-items:center; gap:9px; font-family:var(--font-mono); font-size:11.5px; color:var(--ink-soft); }
  .status .dot{ width:8px; height:8px; border-radius:50%; background:var(--accent); transition:background .5s var(--ease); animation:pulse 2.2s var(--ease) infinite; }
  @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.4} }
  .resume-link{ font-family:var(--font-mono); font-size:11.5px; color:var(--ink-faint); transition:color .3s; }
  .resume-link:hover{ color:var(--accent); }

  /* MAIN / VIEWS */
  .main{ position:relative; overflow:hidden; }
  .view{ position:absolute; inset:0; overflow-y:auto; padding:clamp(28px,6vw,80px); opacity:0; visibility:hidden; transform:translateY(18px); transition:opacity .45s var(--ease), transform .45s var(--ease), visibility .45s; }
  .view.active{ opacity:1; visibility:visible; transform:none; position:relative; min-height:100vh; }
  .view::-webkit-scrollbar{ width:8px; } .view::-webkit-scrollbar-thumb{ background:var(--line); border-radius:99px; }

  [data-reveal]{ opacity:0; transform:translateY(20px); }
  .view.active.revealed [data-reveal]{ animation:rise .6s var(--spring) forwards; }
  /* while editing, show content instantly so typing doesn't re-trigger reveals */
  body.editing [data-reveal]{ opacity:1 !important; transform:none !important; animation:none !important; }

  /* HOME */
  .home-eyebrow{ display:inline-flex; align-items:center; gap:9px; font-family:var(--font-mono); font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-soft); background:var(--paper-2); padding:8px 14px; border-radius:99px; margin-bottom:30px; }
  .home-eyebrow .pip{ width:7px; height:7px; border-radius:50%; background:var(--accent); transition:background .5s var(--ease); }
  .home-grid{ display:grid; grid-template-columns:1.45fr .9fr; gap:clamp(30px,5vw,68px); align-items:center; max-width:1180px; }
  h1.name{ font-family:var(--font-display); font-weight:800; font-size:clamp(3rem,8vw,7rem); line-height:.9; letter-spacing:-0.045em; margin-bottom:24px; }
  h1.name .squiggle{ color:var(--accent); transition:color .5s var(--ease); }
  .role{ font-family:var(--font-display); font-weight:600; font-size:clamp(1.15rem,2.6vw,1.7rem); margin-bottom:20px; }
  .role .hl{ background:linear-gradient(transparent 62%, var(--pop) 62%); padding:0 4px; }
  .tagline{ color:var(--ink-soft); font-size:1.1rem; max-width:46ch; margin-bottom:34px; }
  .home-meta{ display:flex; flex-wrap:wrap; gap:14px; }
  .meta-pill{ background:var(--paper-2); border-radius:14px; padding:13px 18px; }
  .meta-pill .k{ font-family:var(--font-mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-faint); }
  .meta-pill .v{ font-family:var(--font-display); font-weight:600; font-size:1rem; margin-top:3px; }
  .home-cta{ margin-top:36px; display:flex; gap:14px; flex-wrap:wrap; }
  .btn{ display:inline-flex; align-items:center; gap:10px; padding:15px 26px; border-radius:99px; font-family:var(--font-display); font-weight:600; font-size:.98rem; transition:transform .3s var(--spring), background .3s, color .3s; }
  .btn .arrow{ transition:transform .3s var(--spring); }
  .btn:hover{ transform:scale(1.05) rotate(-1deg); }
  .btn:hover .arrow{ transform:translateX(4px); }
  .btn.primary{ background:var(--accent); color:var(--on-accent); }
  .btn.ghost{ background:transparent; border:2px solid var(--ink); color:var(--ink); }
  .btn.ghost:hover{ background:var(--ink); color:var(--paper); }

  /* PHOTO: replace .photo-ph block with <img src="you.jpg" alt="name"> */
  .photo-wrap{ position:relative; }
  .photo-frame{ position:relative; aspect-ratio:4/5; border-radius:26px; overflow:hidden; background:var(--paper-2); border:3px solid var(--ink); transform:rotate(2deg); transition:transform .4s var(--spring); }
  .photo-frame:hover{ transform:rotate(0deg) scale(1.01); }
  .photo-frame img{ width:100%; height:100%; object-fit:cover; }
  .photo-ph{ width:100%; height:100%; display:grid; place-items:center; background:linear-gradient(135deg, var(--accent) 0%, color-mix(in srgb, var(--accent) 60%, var(--pop)) 100%); }
  .photo-ph .mk{ font-family:var(--font-display); font-weight:800; font-size:4rem; color:var(--on-accent); }
  .photo-ph p{ position:absolute; bottom:18px; font-family:var(--font-mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--on-accent); opacity:.8; }
  .photo-badge{ position:absolute; bottom:-16px; right:-12px; background:var(--pop); color:var(--ink); font-family:var(--font-display); font-weight:700; font-size:.85rem; padding:10px 16px; border-radius:99px; transform:rotate(-6deg); box-shadow:0 8px 24px rgba(20,17,14,.12); }

  /* SECTION HEAD (about/projects/contact) */
  .sec-head{ display:flex; align-items:center; gap:18px; margin-bottom:44px; }
  .sec-num{ font-family:var(--font-mono); font-size:13px; color:var(--accent); transition:color .5s var(--ease); }
  .sec-title{ font-family:var(--font-display); font-weight:800; font-size:clamp(2rem,5vw,3.4rem); letter-spacing:-.035em; }
  .sec-title .dot{ color:var(--accent); transition:color .5s var(--ease); }
  .sec-rule{ flex:1; height:2px; background:var(--line); border-radius:99px; }

  /* ABOUT */
  .about-grid{ display:grid; grid-template-columns:1.3fr .9fr; gap:clamp(34px,5vw,68px); max-width:1180px; }
  .about-body .lead{ font-family:var(--font-display); font-weight:500; font-size:clamp(1.3rem,2.6vw,1.7rem); line-height:1.4; letter-spacing:-.01em; margin-bottom:26px; }
  .about-body p{ color:var(--ink-soft); font-size:1.08rem; margin-bottom:18px; }
  .about-body p strong{ color:var(--ink); font-weight:600; }
  .timeline{ margin-top:30px; }
  .tl-item{ display:grid; grid-template-columns:78px 1fr; gap:18px; padding:18px 0; border-top:1px solid var(--line); }
  .tl-item .yr{ font-family:var(--font-mono); font-size:12px; color:var(--accent); transition:color .5s var(--ease); padding-top:2px; }
  .tl-item h4{ font-family:var(--font-display); font-weight:700; font-size:1.1rem; }
  .tl-item .org{ color:var(--ink-faint); font-size:13px; margin-top:2px; font-family:var(--font-mono); }
  .tl-item p{ color:var(--ink-soft); font-size:.97rem; margin-top:7px; }

  .side-card{ background:var(--paper-2); border-radius:22px; padding:26px; }
  .side-card h3{ font-family:var(--font-mono); font-size:11px; letter-spacing:.16em; color:var(--ink-faint); text-transform:uppercase; margin-bottom:18px; }
  .skill-row{ margin-bottom:16px; }
  .skill-row .top{ display:flex; justify-content:space-between; font-size:13px; font-weight:600; margin-bottom:7px; }
  .skill-row .top span:last-child{ font-family:var(--font-mono); color:var(--ink-faint); font-weight:400; }
  .skill-track{ height:8px; background:var(--paper); border-radius:99px; overflow:hidden; }
  .skill-track i{ display:block; height:100%; width:0; background:var(--accent); border-radius:99px; transition:width 1s var(--spring), background .5s var(--ease); }
  .view.active.revealed .skill-track i{ width:var(--lvl); }
  .chips{ display:flex; flex-wrap:wrap; gap:8px; margin-top:6px; }
  .chip{ font-family:var(--font-mono); font-size:11.5px; background:var(--paper); border-radius:99px; padding:7px 14px; transition:transform .25s var(--spring); }
  .chip:hover{ transform:translateY(-2px) rotate(-2deg); color:var(--accent); }

  /* PROJECTS */
  .filters{ display:flex; flex-wrap:wrap; gap:10px; margin-bottom:36px; }
  .filter{ font-family:var(--font-mono); font-size:12px; letter-spacing:.04em; color:var(--ink-soft); padding:10px 18px; border-radius:99px; background:var(--paper-2); transition:all .25s var(--spring); }
  .filter:hover{ transform:translateY(-2px); }
  .filter.active{ background:var(--accent); color:var(--on-accent); }
  .proj-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:20px; max-width:1180px; }
  .proj-card{ position:relative; border-radius:22px; padding:28px 26px; background:var(--paper-2); transition:transform .35s var(--spring), box-shadow .35s; text-align:left; width:100%; display:flex; flex-direction:column; min-height:248px; overflow:hidden; }
  .proj-card:hover{ transform:translateY(-6px) rotate(-.6deg); box-shadow:0 18px 40px rgba(20,17,14,.1); }
  .proj-card:focus-visible{ outline:3px solid var(--accent); outline-offset:3px; }
  .proj-card .blobby{ position:absolute; width:120px; height:120px; border-radius:50%; background:var(--accent); opacity:.1; top:-30px; right:-30px; transition:transform .4s var(--spring), background .5s; }
  .proj-card:hover .blobby{ transform:scale(1.5); }
  .pc-top{ display:flex; justify-content:space-between; align-items:flex-start; }
  .pc-cat{ font-family:var(--font-mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); transition:color .5s; }
  .pc-yr{ font-family:var(--font-mono); font-size:11px; color:var(--ink-faint); }
  .pc-title{ font-family:var(--font-display); font-weight:800; font-size:1.5rem; letter-spacing:-.02em; margin:22px 0 10px; }
  .pc-sum{ color:var(--ink-soft); font-size:.96rem; margin-bottom:18px; }
  .pc-tags{ display:flex; flex-wrap:wrap; gap:7px; margin-top:auto; }
  .pc-tag{ font-family:var(--font-mono); font-size:10px; color:var(--ink-soft); background:var(--paper); border-radius:99px; padding:5px 11px; }
  .pc-go{ display:inline-flex; align-items:center; gap:7px; margin-top:16px; font-family:var(--font-mono); font-size:11px; color:var(--accent); transition:gap .25s; }
  .proj-card:hover .pc-go{ gap:12px; }

  /* MODAL */
  #modal{ position:fixed; inset:0; z-index:80; display:flex; align-items:center; justify-content:center; padding:24px; opacity:0; visibility:hidden; transition:opacity .35s var(--ease), visibility .35s; }
  #modal.open{ opacity:1; visibility:visible; }
  .modal-scrim{ position:absolute; inset:0; background:rgba(20,17,14,.55); backdrop-filter:blur(4px); }
  .modal-card{ position:relative; z-index:1; background:var(--paper); border-radius:26px; max-width:640px; width:100%; max-height:86vh; overflow-y:auto; padding:clamp(28px,4vw,46px); transform:translateY(20px) scale(.96); transition:transform .4s var(--spring); }
  #modal.open .modal-card{ transform:none; }
  .modal-card::-webkit-scrollbar{ width:8px } .modal-card::-webkit-scrollbar-thumb{ background:var(--line); border-radius:99px }
  .modal-close{ position:absolute; top:18px; right:18px; width:42px; height:42px; border-radius:50%; background:var(--paper-2); display:grid; place-items:center; font-size:20px; color:var(--ink-soft); transition:all .3s var(--spring); }
  .modal-close:hover{ background:var(--accent); color:var(--on-accent); transform:rotate(90deg); }
  .m-cat{ font-family:var(--font-mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); }
  .m-title{ font-family:var(--font-display); font-weight:800; font-size:clamp(1.7rem,4vw,2.4rem); letter-spacing:-.03em; margin:12px 0 4px; }
  .m-meta{ font-family:var(--font-mono); font-size:12px; color:var(--ink-faint); margin-bottom:24px; }
  .m-body{ color:var(--ink-soft); font-size:1.04rem; }
  .m-body p{ margin-bottom:15px; }
  .m-label{ font-family:var(--font-mono); font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-faint); margin:26px 0 12px; }
  .m-tags{ display:flex; flex-wrap:wrap; gap:8px; }
  .m-tag{ font-family:var(--font-mono); font-size:11px; color:var(--ink-soft); background:var(--paper-2); border-radius:99px; padding:6px 13px; }
  .m-links{ display:flex; gap:12px; flex-wrap:wrap; margin-top:28px; }

  /* CONTACT */
  .contact-wrap{ max-width:900px; }
  .contact-lead{ font-family:var(--font-display); font-weight:700; font-size:clamp(1.8rem,4.5vw,3rem); line-height:1.2; letter-spacing:-.03em; margin-bottom:18px; }
  .contact-lead a{ color:var(--accent); transition:color .5s; }
  .contact-lead a:hover{ text-decoration:underline; text-decoration-thickness:3px; text-underline-offset:5px; }
  .contact-sub{ color:var(--ink-soft); font-size:1.08rem; margin-bottom:46px; max-width:50ch; }

    <div class="proj-grid" id="projGrid"></div>`;
  renderProjectCards();
  document.querySelectorAll('#projects-content .filter').forEach(f=> f.addEventListener('click',()=>{ currentFilter=f.dataset.cat; renderProjects(); requestRevealReplay(); }));
}
function renderProjectCards(){
  const grid = document.getElementById('projGrid'); if(!grid) return;
  const list = CONTENT.projects.filter(p=> currentFilter==='All'||p.category===currentFilter);
  grid.innerHTML = list.map((p,i)=>`
    <button class="proj-card" data-pi="${CONTENT.projects.indexOf(p)}" style="animation-delay:${i*.05}s" data-reveal>
      <span class="blobby"></span>
      <div class="pc-top"><span class="pc-cat">${esc(p.category)}</span><span class="pc-yr">${esc(p.year)}</span></div>
      <h3 class="pc-title">${esc(p.title)}</h3>
      <p class="pc-sum">${esc(p.summary)}</p>
      <div class="pc-tags">${(p.tags||[]).slice(0,3).map(t=>`<span class="pc-tag">${esc(t)}</span>`).join('')}</div>
      <span class="pc-go">Open project →</span>
    </button>`).join('');
  grid.querySelectorAll('.proj-card').forEach(c=> c.addEventListener('click',()=> openModal(CONTENT.projects[+c.dataset.pi])));
}

function renderContact(){
  const c = CONTENT.contact;
  document.getElementById('contact-content').innerHTML = `
    <div class="sec-head" data-reveal><span class="sec-num">/03</span><h2 class="sec-title">Contact<span class="dot">.</span></h2><span class="sec-rule"></span></div>
    <div class="contact-wrap">
      <p class="contact-lead" data-reveal>${c.lead}</p>
      <p class="contact-sub" data-reveal style="animation-delay:.1s">${esc(c.sub)}</p>
      <div class="links-grid" data-reveal style="animation-delay:.2s">
        ${c.links.map(l=>`<a class="link-card" href="${esc(l.url)}" ${/^https?:/.test(l.url)?'target="_blank" rel="noopener"':''}><div><div class="lk">${esc(l.label)}</div><div class="lv">${esc(l.value)}</div></div><span class="arrow">↗</span></a>`).join('')}
      </div>
      <div class="footer-note" data-reveal style="animation-delay:.3s">
        <span>© 2026 ${esc(CONTENT.profile.name).toUpperCase()} — BUILT FROM SCRATCH</span>
        <span>DESIGNED &amp; ENGINEERED · v2.0</span>
      </div>
    </div>`;
}

function renderIntro(){
  document.getElementById('introTag').textContent = CONTENT.intro.tag;
  document.getElementById('introHello').textContent = CONTENT.intro.hello;
  document.getElementById('introSub').textContent = CONTENT.intro.sub;
}

function renderAll(){
  renderBrand(); renderNav(); renderHome(); renderAbout(); renderProjects(); renderContact(); renderIntro();
  applyAccent(currentSection);
}

/* ================= NAV / VIEW SWITCH ================= */
function bindNav(){
  document.querySelectorAll('[data-view]').forEach(it=>{
    if(it._bound) return; it._bound=true;
    it.addEventListener('click',()=> switchTo(it.dataset.view));
  });
}
function requestRevealReplay(){
  const el = document.getElementById('view-'+currentSection);
  el.classList.remove('revealed'); void el.offsetWidth;
  requestAnimationFrame(()=> el.classList.add('revealed'));
}
function switchTo(key){
  currentSection = key;
  const views = ['home','about','projects','contact'];
  views.forEach(k=>{
    const el = document.getElementById('view-'+k);
    const on = k===key; el.classList.toggle('active', on);
    if(on){ el.classList.remove('revealed'); void el.offsetWidth; requestAnimationFrame(()=> el.classList.add('revealed')); }
  });
  document.querySelectorAll('.nav-item').forEach(n=> n.classList.toggle('active', n.dataset.view===key));
  document.getElementById('bdSection').textContent = key==='home'?'Home':key.charAt(0).toUpperCase()+key.slice(1);
  applyAccent(key);
  document.getElementById('main').scrollTop = 0;
  document.getElementById('mobileMenu').classList.remove('open');
  document.getElementById('menuBtn').classList.remove('open');
}

/* ================= MODAL ================= */
function openModal(p){
  if(!p) return;
  document.getElementById('mCat').textContent = p.category;
  document.getElementById('mTitle').textContent = p.title;
  document.getElementById('mMeta').textContent = `${p.year} · Project`;
  document.getElementById('mBody').innerHTML = (p.description||[]).map(d=>`<p>${esc(d)}</p>`).join('');
  document.getElementById('mTags').innerHTML = (p.tags||[]).map(t=>`<span class="m-tag">${esc(t)}</span>`).join('');
  document.getElementById('mLinks').innerHTML = (p.links||[]).map(l=>`<a class="btn ghost" href="${esc(l.url)}" ${/^https?:/.test(l.url)?'target="_blank" rel="noopener"':''}>${esc(l.label)}</a>`).join('');
  document.getElementById('modal').classList.add('open'); document.body.style.overflow='hidden';
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); document.body.style.overflow=''; }

/* ================= EDIT PANEL ================= */
function fld(label,path,val,opt={}){
  const v = esc(val);
  if(opt.textarea) return `<div class="fld"><label>${label}</label><textarea data-path="${path}" rows="${opt.rows||3}">${v}</textarea>${opt.hint?`<div class="hint">${opt.hint}</div>`:''}</div>`;
  return `<div class="fld"><label>${label}</label><input data-path="${path}" type="${opt.type||'text'}" value="${v}">${opt.hint?`<div class="hint">${opt.hint}</div>`:''}</div>`;
}
function buildEditor(){
  const C = CONTENT, p = C.profile;
  const themeSw = THEME_PRESETS.map(c=>`<button class="swatch${c===C.theme?' sel':''}" style="background:${c}" data-theme="${c}" title="${c}"></button>`).join('');
  const skills = C.about.skills.map((s,i)=>`<div class="rep-item"><button class="del" data-del="skill" data-i="${i}">remove</button>
      <div class="fld"><label>Skill</label><input data-arr="skill" data-i="${i}" data-k="name" value="${esc(s.name)}"></div>
      <div class="fld"><label>Level (0–100)</label><input data-arr="skill" data-i="${i}" data-k="level" type="number" min="0" max="100" value="${esc(s.level)}"></div></div>`).join('');
  const tl = C.about.timeline.map((t,i)=>`<div class="rep-item"><button class="del" data-del="tl" data-i="${i}">remove</button>
      <div class="fld"><label>Year</label><input data-arr="tl" data-i="${i}" data-k="year" value="${esc(t.year)}"></div>
      <div class="fld"><label>Title</label><input data-arr="tl" data-i="${i}" data-k="title" value="${esc(t.title)}"></div>
      <div class="fld"><label>Org</label><input data-arr="tl" data-i="${i}" data-k="org" value="${esc(t.org)}"></div>
      <div class="fld"><label>Description</label><textarea data-arr="tl" data-i="${i}" data-k="desc" rows="2">${esc(t.desc)}</textarea></div></div>`).join('');
  const proj = C.projects.map((pr,i)=>`<div class="rep-item"><button class="del" data-del="proj" data-i="${i}">remove</button>
      <div class="fld"><label>Title</label><input data-arr="proj" data-i="${i}" data-k="title" value="${esc(pr.title)}"></div>
      <div class="fld"><label>Category</label><input data-arr="proj" data-i="${i}" data-k="category" value="${esc(pr.category)}"></div>
      <div class="fld"><label>Year</label><input data-arr="proj" data-i="${i}" data-k="year" value="${esc(pr.year)}"></div>
      <div class="fld"><label>Card summary</label><textarea data-arr="proj" data-i="${i}" data-k="summary" rows="2">${esc(pr.summary)}</textarea></div>
      <div class="fld"><label>Full description</label><textarea data-arr="proj" data-i="${i}" data-k="description" rows="4">${esc((pr.description||[]).join("\n\n"))}</textarea><div class="hint">Separate paragraphs with a blank line.</div></div>
      <div class="fld"><label>Tags</label><input data-arr="proj" data-i="${i}" data-k="tags" value="${esc((pr.tags||[]).join(", "))}"><div class="hint">Comma-separated.</div></div>
      <div class="fld"><label>Links</label><textarea data-arr="proj" data-i="${i}" data-k="links" rows="2">${esc((pr.links||[]).map(l=>l.label+" | "+l.url).join("\n"))}</textarea><div class="hint">One per line: Label | https://url</div></div></div>`).join('');
  const links = C.contact.links.map((l,i)=>`<div class="rep-item"><button class="del" data-del="clink" data-i="${i}">remove</button>
      <div class="fld"><label>Label</label><input data-arr="clink" data-i="${i}" data-k="label" value="${esc(l.label)}"></div>
      <div class="fld"><label>Shown text</label><input data-arr="clink" data-i="${i}" data-k="value" value="${esc(l.value)}"></div>
      <div class="fld"><label>URL</label><input data-arr="clink" data-i="${i}" data-k="url" value="${esc(l.url)}"></div></div>`).join('');

  document.getElementById('edBody').innerHTML = `
    <div class="ed-note">Edits apply live. They live in this browser only — click <b>Export content.json</b> to save them, then upload that file next to index.html on your host.</div>

    <details class="ed-group" open><summary>Profile</summary><div class="ed-content">
      ${fld("Name","profile.name",p.name)}
      ${fld("Initials","profile.initials",p.initials)}
      ${fld("Role / title","profile.role",p.role)}
      ${fld("Tagline","profile.tagline",p.tagline,{textarea:true,rows:4})}
      ${fld("Focus","profile.focus",p.focus)}
      ${fld("Experience","profile.experience",p.experience)}
      ${fld("Location","profile.location",p.location)}
      ${fld("Status","profile.status",p.status)}
      ${fld("Photo badge","profile.photoBadge",p.photoBadge)}
    </div></details>

    <details class="ed-group"><summary>Theme colour</summary><div class="ed-content">
      <div class="fld"><label>Home accent</label><div class="theme-swatches">${themeSw}</div><div class="hint">Other tabs use their own colours automatically.</div></div>
    </div></details>

    <details class="ed-group"><summary>Welcome intro</summary><div class="ed-content">
      ${fld("Tag","intro.tag",C.intro.tag)}
      ${fld("Headline","intro.hello",C.intro.hello)}
      ${fld("Subtext","intro.sub",C.intro.sub,{textarea:true})}
    </div></details>

    <details class="ed-group"><summary>About</summary><div class="ed-content">
      ${fld("Lead line","about.lead",C.about.lead,{textarea:true})}
      ${fld("Paragraphs","about.paragraphs",(C.about.paragraphs||[]).join("\n\n"),{textarea:true,rows:6,hint:"Separate paragraphs with a blank line."})}
      <label style="font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint)">Experience / timeline</label>
      <div id="rep-tl">${tl}</div><button class="add-btn" data-add="tl">+ Add entry</button>
    </div></details>

    <details class="ed-group"><summary>Skills &amp; toolbox</summary><div class="ed-content">
      <div id="rep-skill">${skills}</div><button class="add-btn" data-add="skill">+ Add skill</button>
      <div style="height:14px"></div>
      ${fld("Toolbox tags","about.toolbox",(C.about.toolbox||[]).join(", "),{hint:"Comma-separated."})}
    </div></details>

    <details class="ed-group"><summary>Projects</summary><div class="ed-content">
      <div id="rep-proj">${proj}</div><button class="add-btn" data-add="proj">+ Add project</button>
    </div></details>

    <details class="ed-group"><summary>Contact</summary><div class="ed-content">
      ${fld("Lead (HTML allowed)","contact.lead",C.contact.lead,{textarea:true,hint:"You can include an &lt;a href&gt; link."})}
      ${fld("Subtext","contact.sub",C.contact.sub,{textarea:true})}
      <label style="font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint)">Links</label>
      <div id="rep-clink">${links}</div><button class="add-btn" data-add="clink">+ Add link</button>
    </div></details>`;
}

/* live-apply edits (no editor rebuild → keeps input focus) */
function onEditInput(e){
  const t = e.target;
  if(t.dataset.path){ setPath(CONTENT, t.dataset.path, parseField(t.dataset.path, t.value)); renderAll(); requestRevealReplay(); return; }
  if(t.dataset.arr){
    const i=+t.dataset.i, k=t.dataset.k, v=t.value;
    if(t.dataset.arr==='skill'){ CONTENT.about.skills[i][k] = k==='level'? (Number(v)||0) : v; }
    if(t.dataset.arr==='tl'){ CONTENT.about.timeline[i][k] = v; }
    if(t.dataset.arr==='clink'){ CONTENT.contact.links[i][k] = v; }
    if(t.dataset.arr==='proj'){
      const pr = CONTENT.projects[i];
      if(k==='description') pr.description = v.split(/\n\s*\n/).map(s=>s.trim()).filter(Boolean);
      else if(k==='tags') pr.tags = v.split(",").map(s=>s.trim()).filter(Boolean);
      else if(k==='links') pr.links = v.split("\n").map(s=>s.trim()).filter(Boolean).map(line=>{ const [lab,...u]=line.split("|"); return {label:(lab||"").trim(), url:(u.join("|")||"#").trim()}; });
      else pr[k]=v;
    }
    renderAll(); requestRevealReplay();
  }
}
function parseField(path,v){
  if(path==='about.paragraphs') return v.split(/\n\s*\n/).map(s=>s.trim()).filter(Boolean);
  if(path==='about.toolbox') return v.split(",").map(s=>s.trim()).filter(Boolean);
  return v;
}
function onEditClick(e){
  const t = e.target.closest('[data-add],[data-del],[data-theme]'); if(!t) return;
  if(t.dataset.theme){ CONTENT.theme=t.dataset.theme; renderAll(); buildEditor(); return; }
  if(t.dataset.add){
    const a=t.dataset.add;
    if(a==='skill') CONTENT.about.skills.push({name:"New skill",level:50});
    if(a==='tl') CONTENT.about.timeline.push({year:"2026",title:"Role",org:"Company",desc:"What you did."});
    if(a==='clink') CONTENT.contact.links.push({label:"Label",value:"shown text",url:"https://"});
    if(a==='proj') CONTENT.projects.push({category:"Web",title:"New Project",year:"2026",summary:"Short summary.",description:["Describe it here."],tags:["Tag"],links:[{label:"Link ↗",url:"#"}]});
    renderAll(); buildEditor(); return;
  }
  if(t.dataset.del){
    const a=t.dataset.del, i=+t.dataset.i;
    if(a==='skill') CONTENT.about.skills.splice(i,1);
    if(a==='tl') CONTENT.about.timeline.splice(i,1);
    if(a==='clink') CONTENT.contact.links.splice(i,1);
    if(a==='proj') CONTENT.projects.splice(i,1);
    renderAll(); buildEditor();
  }
}
function exportJSON(){
  const blob = new Blob([JSON.stringify(CONTENT,null,2)],{type:"application/json"});
  const url = URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download="content.json"; a.click(); URL.revokeObjectURL(url);
}
function importJSON(file){
  const r=new FileReader();
  r.onload=()=>{ try{ CONTENT=Object.assign(structuredClone(DEFAULT_CONTENT), JSON.parse(r.result)); renderAll(); buildEditor(); requestRevealReplay(); }catch(err){ alert("That file isn't valid content.json"); } };
  r.readAsText(file);
}

/* ================= LOADER + INTRO ================= */
function runLoader(){
  const loader=document.getElementById('loader'), fill=document.getElementById('loadFill'), msg=document.getElementById('loadMsg');
  const msgs=["plotting your route…","packing the essentials…","calibrating compass…","ready to explore"];
  let mi=0; const msgT=setInterval(()=>{ mi=Math.min(mi+1,msgs.length-1); msg.textContent=msgs[mi]; }, reduceMotion?1:520);
  const dur=reduceMotion?1:1900, start=performance.now();
  (function tick(now){ const t=Math.min(1,(now-start)/dur); fill.style.width=Math.round(t*100)+'%';
    if(t<1) requestAnimationFrame(tick); else { clearInterval(msgT); setTimeout(()=>{ loader.classList.add('done'); showIntro(); }, reduceMotion?0:350); }
  })(start);
}
function showIntro(){
  const intro=document.getElementById('intro'), app=document.getElementById('app');
  /* ===== ONE-TIME INTRO (enable after you deploy) =====
     To show the welcome only on a visitor's first visit, uncomment:
       try{ if(localStorage.getItem('seenIntro')){ app.classList.add('ready'); return; } localStorage.setItem('seenIntro','1'); }catch(e){}
     ==================================================== */
  app.classList.add('ready'); intro.classList.add('show');
  const leave=()=>{ intro.classList.add('leaving'); document.removeEventListener('keydown',k); };
  const k=e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); leave(); } };
  document.getElementById('enterBtn').addEventListener('click',leave);
  document.addEventListener('keydown',k);
  setTimeout(()=>{ if(intro.classList.contains('show')&&!intro.classList.contains('leaving')) leave(); }, reduceMotion?100:9000);
}

/* ================= INIT ================= */
async function init(){
  // Load content.json if the site is hosted and the file exists; else use defaults.
  try{
    const res = await fetch('content.json',{cache:'no-store'});
    if(res.ok){ const data=await res.json(); CONTENT=Object.assign(structuredClone(DEFAULT_CONTENT), data); }
  }catch(e){ /* not hosted / no file — fine, use defaults */ }

  renderAll();
  bindNav();
  setTimeout(()=> document.getElementById('view-home').classList.add('revealed'), reduceMotion?0:180);

  // global bindings
  document.getElementById('menuBtn').addEventListener('click',function(){ this.classList.toggle('open'); document.getElementById('mobileMenu').classList.toggle('open'); });
  document.querySelectorAll('#modal [data-close]').forEach(el=> el.addEventListener('click',closeModal));
  document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeModal(); document.getElementById('editor').classList.remove('open'); } });

  // editor wiring
  buildEditor();
  const editor=document.getElementById('editor');
  document.getElementById('editToggle').addEventListener('click',()=> editor.classList.toggle('open'));
  document.getElementById('edClose').addEventListener('click',()=> editor.classList.remove('open'));
  const edBody=document.getElementById('edBody');
  edBody.addEventListener('input', onEditInput);
  edBody.addEventListener('click', onEditClick);
  document.getElementById('edExport').addEventListener('click', exportJSON);
  document.getElementById('edImport').addEventListener('click',()=> document.getElementById('edFile').click());
  document.getElementById('edFile').addEventListener('change',e=>{ if(e.target.files[0]) importJSON(e.target.files[0]); e.target.value=''; });
  document.getElementById('edReset').addEventListener('click',()=>{ if(confirm("Reset all content to the original sample?")){ CONTENT=structuredClone(DEFAULT_CONTENT); renderAll(); buildEditor(); requestRevealReplay(); } });

  runLoader();
}
window.addEventListener('DOMContentLoaded', init);
</script>
